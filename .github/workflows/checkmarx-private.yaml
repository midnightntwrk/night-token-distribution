name: Checkmarx One Scan (Private Repos)

# use only job-level permissions
permissions: {}

on:
  pull_request:  # Safe for private repos (no external forks possible)
    branches: ["**"]
  push:
    branches: ["main"]
  workflow_dispatch: {}
  schedule:
    - cron: "0 0 * * *"   # run daily at midnight UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  build:
    # Only run if repo is private
    if: github.event.repository.private == true

    permissions:
      contents: read
      pull-requests: write
      security-events: write
      actions: read

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Configure npm auth for GitHub Packages
        run: |
          echo "@midnight-ntwrk:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.MIDNIGHTCI_REPO }}" >> .npmrc

      - name: Checkmarx Full Scan
        uses: midnightntwrk/upload-sarif-github-action/checkmarx-scan@1cb8d938a59278c75debcba914519ee0bcf8cc9c
        with:
          cx-client-id: ${{ secrets.CX_CLIENT_ID }}
          cx-client-secret: ${{ secrets.CX_CLIENT_SECRET_EU }}
          cx-tenant: ${{ secrets.CX_TENANT }}
          scs-repo-token: ${{ secrets.MIDNIGHTCI_REPO }}
          upload-to-github: "true"
